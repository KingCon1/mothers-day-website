<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mother's Day Website</title>
    <style>
        .fade {
            animation: fade 2s;
        }

        @keyframes fade {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .light-blue-bg {
            background-color: lightblue;
            padding: 10px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="light-blue-bg fade">I created this Mother's Day menu slideshow...</div>
    <div class="light-blue-bg fade">This project was challenging for me...</div>
    <div class="light-blue-bg fade">I've never made something this complex before...</div>
</body>
</html>
