<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mother's Day Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f4ff; /* Soft blue background */
            color: #333; /* Dark text for readability */
        }
        header {
            text-align: center;
            padding: 20px;
            background-color: #0056b3; /* Clean blue header */
            color: white;
        }
        .content {
            padding: 20px;
            margin: auto;
            max-width: 800px;
        }
        footer {
            text-align: center;
            padding: 10px;
            background-color: #003d7a; /* Darker blue footer */
            color: white;
            position: relative;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>
    <header>
        <h1>Happy Mother's Day!</h1>
    </header>
    <div class="content">
        <h2>Celebrating All Mothers</h2>
        <p>This day is dedicated to honoring mothers and their contributions to our lives.</p>
        <p>Join us in celebrating with love and gratitude!</p>
    </div>
    <footer>
        <p>© 2026 Mother's Day Website</p>
    </footer>
</body>
</html>
