<!DOCTYPE html>
<html>
<head>
    <title>Mothers Day Website</title>
    <style>
        .blue-box {
            background-color: lightblue;
            border: 2px solid blue;
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="blue-box">
        <p>Paragraph 1: Mothers hold their children's hands for a short while, but their hearts forever.</p>
    </div>
    <div class="blue-box">
        <p>Paragraph 2: A mother is she who can take the place of all others but whose place no one else can take.</p>
    </div>
    <div class="blue-box">
        <p>Paragraph 3: Life doesn't come with a manual. It comes with a mother.</p>
    </div>
</body>
</html>
