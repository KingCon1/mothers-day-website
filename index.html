<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mothers Day Website</title>
    <style>
        .fade-in {
            opacity: 0;
            transition: opacity 1s ease-in;
        }
        .fade-in.visible {
            opacity: 1;
        }
        .container {
            background-color: lightblue;
            padding: 15px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container fade-in" id="section1">
        <p>This is the first paragraph of your content.</p>
    </div>
    <div class="container fade-in" id="section2">
        <p>This is the second paragraph of your content.</p>
    </div>
    <div class="container fade-in" id="section3">
        <p>This is the third paragraph of your content.</p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const sections = document.querySelectorAll('.fade-in');
            sections.forEach((section, index) => {
                setTimeout(() => {
                    section.classList.add('visible');
                }, index * 500);
            });
        });
    </script>
</body>
</html>
